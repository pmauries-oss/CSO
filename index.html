<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Livret CSO</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --rouge:      #C0272D;
    --marine:     #0D1B2A;
    --marine-2:   #162336;
    --marine-3:   #1E3048;
    --gris-clair: #E8EBEE;
    --gris-moyen: #9BAAB8;
    --blanc:      #F4F6F8;
    --or:         #D4A843;
    --vert:       #3B6D11;
    --violet:     #534AB7;
    --font-titre: 'Barlow Condensed', sans-serif;
    --font-corps: 'Barlow', sans-serif;
  }
  body { background-color: var(--marine); color: var(--blanc); font-family: var(--font-corps); min-height: 100vh; }

  .topbar {
    background: var(--rouge); padding: 6px 2rem;
    display: flex; align-items: center; gap: 10px;
    font-family: var(--font-titre); font-size: 13px;
    letter-spacing: 0.08em; font-weight: 600; text-transform: uppercase;
    color: rgba(255,255,255,0.9);
  }
  .topbar-dot { width: 6px; height: 6px; border-radius: 50%; background: rgba(255,255,255,0.5); }

  header {
    background: var(--marine-2); border-bottom: 3px solid var(--rouge);
    padding: 2rem 2rem 1.75rem; display: flex; align-items: center; gap: 2rem;
  }
  .header-badge {
    flex-shrink: 0; width: 72px; height: 72px;
    display: flex; align-items: center; justify-content: center;
  }
  .header-badge img { width: 72px; height: 72px; object-fit: contain; }
  .header-text h1 {
    font-family: var(--font-titre); font-size: 2rem; font-weight: 700;
    letter-spacing: 0.04em; text-transform: uppercase; line-height: 1.1; color: var(--blanc);
  }
  .header-text h1 span { color: var(--rouge); }
  .header-text p { margin-top: 6px; font-size: 13px; color: var(--gris-moyen); font-weight: 300; letter-spacing: 0.03em; }

  /* COMPTEUR GLOBAL */
  .stats-bar {
    background: var(--marine-3); padding: 10px 2rem;
    display: flex; align-items: center; gap: 2rem;
    font-size: 12px; color: var(--gris-moyen); font-family: var(--font-titre);
    letter-spacing: 0.06em; text-transform: uppercase;
  }
  .stats-bar strong { color: var(--blanc); font-size: 16px; font-weight: 600; }

  main { max-width: 1100px; margin: 0 auto; padding: 2.5rem 1.5rem 4rem; }

  .section { margin-bottom: 3rem; }
  .section-header {
    display: flex; align-items: center; gap: 12px;
    margin-bottom: 1.25rem; padding-bottom: 10px;
    border-bottom: 1px solid var(--marine-3);
  }
  .section-icon {
    width: 32px; height: 32px; border-radius: 4px;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; flex-shrink: 0;
  }
  .section-icon.rouge  { background: rgba(192,39,45,0.18); }
  .section-icon.bleu   { background: rgba(24,95,165,0.22); }
  .section-icon.or     { background: rgba(212,168,67,0.18); }
  .section-icon.vert   { background: rgba(59,109,17,0.22); }
  .section-icon.violet { background: rgba(83,74,183,0.22); }

  .section-title {
    font-family: var(--font-titre); font-size: 1.1rem; font-weight: 600;
    letter-spacing: 0.06em; text-transform: uppercase; color: var(--gris-clair);
  }
  .section-count { margin-left: auto; font-size: 11px; color: var(--gris-moyen); letter-spacing: 0.05em; }

  .cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(210px, 1fr)); gap: 12px; }

  .card {
    background: var(--marine-2); border: 1px solid var(--marine-3);
    border-left: 3px solid transparent; border-radius: 6px;
    padding: 14px 16px; text-decoration: none; color: var(--blanc);
    display: block; transition: background 0.15s, transform 0.12s; position: relative;
  }
  .card:hover { background: var(--marine-3); transform: translateY(-2px); }
  .card.rouge  { border-left-color: var(--rouge); }
  .card.bleu   { border-left-color: #378ADD; }
  .card.or     { border-left-color: var(--or); }
  .card.vert   { border-left-color: #639922; }
  .card.violet { border-left-color: #7F77DD; }

  .card-tag {
    display: inline-block; font-size: 10px; font-family: var(--font-titre);
    font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase;
    padding: 2px 7px; border-radius: 3px; margin-bottom: 8px;
  }
  .card.rouge  .card-tag { background: rgba(192,39,45,0.25);  color: #F47E81; }
  .card.bleu   .card-tag { background: rgba(24,95,165,0.25);  color: #85B7EB; }
  .card.or     .card-tag { background: rgba(212,168,67,0.22); color: #FAC775; }
  .card.vert   .card-tag { background: rgba(59,109,17,0.22);  color: #97C459; }
  .card.violet .card-tag { background: rgba(83,74,183,0.22);  color: #AFA9EC; }

  .card-title { font-size: 14px; font-weight: 500; line-height: 1.4; color: var(--blanc); }
  .card-desc  { margin-top: 6px; font-size: 12px; color: var(--gris-moyen); font-weight: 300; line-height: 1.5; }

  .badge-new {
    display: inline-block; font-size: 9px; font-family: var(--font-titre);
    font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase;
    background: var(--rouge); color: white;
    padding: 1px 5px; border-radius: 3px; vertical-align: middle; margin-left: 6px;
  }

  .card-arrow {
    position: absolute; top: 14px; right: 14px; font-size: 12px;
    color: var(--gris-moyen); opacity: 0; transition: opacity 0.15s;
  }
  .card:hover .card-arrow { opacity: 1; }

  footer {
    text-align: center; padding: 2rem; font-size: 12px;
    color: var(--gris-moyen); border-top: 1px solid var(--marine-3);
    font-weight: 300; letter-spacing: 0.03em;
  }
  footer strong { color: var(--rouge); font-weight: 600; }

  @media (max-width: 600px) {
    header { flex-direction: column; align-items: flex-start; gap: 1rem; }
    .header-text h1 { font-size: 1.5rem; }
    .cards { grid-template-columns: 1fr; }
    .stats-bar { flex-wrap: wrap; gap: 1rem; }
  }
</style>
</head>
<body>

<div class="topbar">
  <span>Livret d'évaluation</span>
  <div class="topbar-dot"></div>
  <span>Conduite Situation Opérationnelle</span>
</div>


<div class="stats-bar">
  <span><strong>1</strong> &nbsp;outil disponible</span>

</div>

<main>

  <!-- LIVRET -->
  <div class="section">
    <div class="section-header">
      <div class="section-icon rouge">🏛️</div>
      <span class="section-title">Livret &amp; d'évaluation</span>
      <span class="section-count">1 outil</span>
    </div>
    <div class="cards">
      <a class="card rouge" href="livret_CSO_v6.html">
        <span class="card-tag">Synthèse</span>
        <div class="card-title">livret d'évaluation</div>
                <span class="card-arrow">→</span>
      </a>

</main>

<footer>
  <strong>Pierre MAURIES</strong> — Concepteur de formation &nbsp;|&nbsp;
  Conduite situation opérationnelle 
</footer>

</body>
</html>
